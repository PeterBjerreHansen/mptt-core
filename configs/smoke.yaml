seed: 0

model:
  variant: memory_tape
  vocab_size: 256
  block_size: 16
  n_layer: 1
  n_head: 1
  n_embd: 16
  n_pass: 2
  dropout: 0.0
  use_flash_attention: false
  memory_gate_init: 0.2

objective:
  pass_weights: [0.0, 1.0]

training:
  train_steps: 4
  batch_size: 2
  learning_rate: 0.0005
  weight_decay: 0.1
  eval_interval: 10
  eval_batches: 1
  log_interval: 5
  device: cpu
  compile: false
  output_dir: runs/smoke

data:
  train_file: tests/fixtures/tiny.txt
  val_file: tests/fixtures/tiny.txt
  pad_token_id: null
